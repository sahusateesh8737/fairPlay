version: '3.8'

services:
  jenkins:
    build:
      context: .
      dockerfile: docker/jenkins/Dockerfile
    container_name: jenkins_fairplay
    privileged: true
    user: root # Needed for Docker socket access
    ports:
      - "8080:8080"
      - "50000:50000"
    environment:
      - CASC_JENKINS_CONFIG=/usr/share/jenkins/ref/jenkins.yaml
    volumes:
      - jenkins_data:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
      - ./docker/jenkins/jenkins.yaml:/usr/share/jenkins/ref/jenkins.yaml:ro
      - npm_cache:/root/.npm # Shared npm cache for performance
    restart: unless-stopped
    networks:
      - fairplay_network

networks:
  fairplay_network:
    driver: bridge

volumes:
  jenkins_data:
  npm_cache:
