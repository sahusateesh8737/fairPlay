jenkins:
  systemMessage: "🛡️ fairPlay — Professional CI/CD Pipeline\nWelcome to the automated grading environment."
  numExecutors: 2
  scmCheckoutRetryCount: 2
  mode: NORMAL

  securityRealm:
    local:
      allowsSignup: false
      enableCaptcha: false
      users:
        - id: "admin"
          password: "password123" # In a real production setup, use secrets.
          name: "FairPlay Admin"

  authorizationStrategy:
    loggedInUsersCanDoAnything:
      allowAnonymousJobStatusPermission: false

unclassified:
  location:
    url: http://localhost:8080/
  gitHubConfiguration:
    apiRateLimitChecker: ThrottleForMaintainers
  dark-theme-manager:
    darkTheme: true

tool:
  nodejs:
    installations:
      - name: "node-20"
        properties:
          - installSource:
              installers:
                - nodejs:
                    id: "20.11.1"

# Automatically create the first pipeline job
# This requires the 'job-dsl' plugin
jobs:
  - script: >
      pipelineJob('fairPlay-Professional-Pipeline') {
          definition {
              cpsScm {
                  scm {
                      git {
                          remote {
                              url('https://github.com/sahusateesh8737/fairPlay.git')
                          }
                          branches('*/main')
                      }
                  }
                  scriptPath('Jenkinsfile')
              }
          }
      }
