name: Backend CI Pipeline

on:
  push:
    branches: [ "main"]
  pull_request:
    branches: [ "main" ]

jobs:
  test_and_build:
    name: Test & Build (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: ./backend

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    strategy:
      fail-fast: false
      matrix:
        node-version: [  22.x]

    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
        cache-dependency-path: './backend/package-lock.json'
        
    - name: Install Dependencies
      run: npm ci
      
    - name: Generate Prisma Client
      run: npx prisma generate
      
    - name: Validate Prisma Schema
      run: npx prisma validate
      
    - name: Initialize Isolated Test Database
      run: npx prisma db push --accept-data-loss
      env:
        DATABASE_URL: postgresql://test_user:test_password@localhost:5432/test_db?schema=public
        
    - name: Run Test Suite (Vitest)
      run: npm run test
      env:
        DATABASE_URL: postgresql://test_user:test_password@localhost:5432/test_db?schema=public
        REDIS_URL: redis://localhost:6379
        PORT: 5001
        JWT_SECRET: cicd_super_secret_token
        CLIENT_URL: http://localhost:5173
        
    - name: Verify Docker Build Sanity
      run: docker build -t fairplay-backend:test .