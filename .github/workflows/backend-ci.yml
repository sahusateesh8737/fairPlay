name: Backend-CI-Pipeline
on:
  push:
    branches: [main]

jobs:
  build-check:
    runs-on: ubuntu-latest
    steps:
      - name: repository cloning
        uses: actions/checkout@v4

      - name: install nodejs
        uses: actions/setup-node@v4
        with:
          node-version: '24'
        
      - name: install dependencies
        run: npm install

      - name: run test
        run: npm run test